<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>归期知识问卷</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --danger: #b91c1c;
      --ok: #166534;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #e8f5f4 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(15, 118, 110, 0.12);
      overflow: hidden;
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0f766e, #155e75);
      color: #fff;
    }
    .header h1 { margin: 0; font-size: 24px; line-height: 1.3; }
    .header p { margin: 8px 0 0; opacity: 0.92; font-size: 14px; }
    .content { padding: 24px; }
    .status { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
    .question { font-size: 20px; line-height: 1.5; margin: 0 0 18px; font-weight: 700; }
    .options { display: grid; gap: 10px; margin-bottom: 22px; }
    .option {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      transition: 0.15s ease;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .option:hover { border-color: #5eead4; background: #f0fdfa; }
    .option input { margin: 0; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      background: #fafafa;
    }
    .panel h2 { margin: 0 0 10px; }
    .panel p { margin: 0; color: var(--muted); }
    .fail h2 { color: var(--danger); }
    .success h2 { color: var(--ok); }
    .qr {
      margin-top: 16px;
      width: min(260px, 75vw);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: block;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="header">
      <h1>归期知识问卷</h1>
      <p>规则：共 10 题，任意一题答错即结束；刷新不重置，浏览器回退无效。</p>
    </div>

    <div class="content" id="quizView">
      <div class="status" id="statusText"></div>
      <h2 class="question" id="questionText"></h2>
      <form id="optionForm" class="options"></form>
      <button id="submitBtn" type="button">提交本题</button>
    </div>

    <div class="content hidden" id="failView">
      <div class="panel fail">
        <h2>答题结束</h2>
        <p id="failText"></p>
      </div>
    </div>

    <div class="content hidden" id="successView">
      <div class="panel success">
        <h2>全部答对，欢迎入群</h2>
        <p>请扫码加入群聊：</p>
        <img class="qr" src="assets/group-qr.png" alt="群聊二维码" />
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "guiqi_quiz_session_v2";

    const questions = [
      {
        title: "1. 归期的本名叫什么？",
        options: ["双小钧", "双小军", "双晓钧", "双小俊"],
        correct: "双小钧"
      },
      {
        title: "2. 归期的生日是？",
        options: ["2005年3月23日", "2005年3月22日", "2005年2月23日", "2004年3月23日"],
        correct: "2005年3月23日"
      },
      {
        title: "3. 归期登上 KPL 赛场的日子是？",
        options: ["2023年4月2日", "2023年4月3日", "2023年3月2日", "2022年4月2日"],
        correct: "2023年4月2日"
      },
      {
        title: "4. 归期的本命英雄是？",
        options: ["影", "曜", "镜", "澜"],
        correct: "影"
      },
      {
        title: "5. 归期喜欢小动物吗？",
        options: ["不喜欢", "喜欢", "一般", "看情况"],
        correct: "不喜欢"
      },
      {
        title: "6. 归期讨厌的蔬菜是？",
        options: ["蘑菇和茄子", "蘑菇和青椒", "茄子和西蓝花", "蘑菇和土豆"],
        correct: "蘑菇和茄子"
      },
      {
        title: "7. 归期登场 KPL 后的第一个冠军是哪一年的什么比赛？",
        options: ["2023年王者荣耀挑战者杯", "2023年KPL春季赛", "2024年王者荣耀挑战者杯", "2022年世界冠军杯"],
        correct: "2023年王者荣耀挑战者杯"
      },
      {
        title: "8. 归期登场 KPL 后的第二个冠军是哪一年的什么比赛？",
        options: ["2024年KPL春季赛", "2024年KPL夏季赛", "2023年KPL春季赛", "2024年王者荣耀挑战者杯"],
        correct: "2024年KPL春季赛"
      },
      {
        title: "9. 归期的直播间房间号是？",
        options: ["286723", "286732", "268723", "286233"],
        correct: "286723"
      },
      {
        title: "10. 归期在 KPL 赛场的五杀英雄是？",
        options: ["关羽", "马超", "曜", "澜"],
        correct: "关羽"
      }
    ];

    const defaultState = {
      index: 0,
      status: "in_progress", // in_progress | failed | passed
      failedAt: null,
      updatedAt: Date.now()
    };

    function readState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...defaultState };
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return { ...defaultState };
        if (!["in_progress", "failed", "passed"].includes(parsed.status)) return { ...defaultState };
        if (typeof parsed.index !== "number") return { ...defaultState };
        return {
          ...defaultState,
          ...parsed,
          index: Math.max(0, Math.min(parsed.index, questions.length))
        };
      } catch {
        return { ...defaultState };
      }
    }

    function writeState() {
      state.updatedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = readState();

    const quizView = document.getElementById("quizView");
    const failView = document.getElementById("failView");
    const successView = document.getElementById("successView");
    const statusText = document.getElementById("statusText");
    const questionText = document.getElementById("questionText");
    const optionForm = document.getElementById("optionForm");
    const submitBtn = document.getElementById("submitBtn");
    const failText = document.getElementById("failText");

    function showOnly(view) {
      [quizView, failView, successView].forEach(v => v.classList.add("hidden"));
      view.classList.remove("hidden");
    }

    function renderQuestion() {
      const q = questions[state.index];
      statusText.textContent = `第 ${state.index + 1} / ${questions.length} 题`;
      questionText.textContent = q.title;
      optionForm.innerHTML = "";

      q.options.forEach((opt, i) => {
        const id = `q${state.index}-o${i}`;
        const label = document.createElement("label");
        label.className = "option";
        label.setAttribute("for", id);

        const input = document.createElement("input");
        input.type = "radio";
        input.name = `question-${state.index}`;
        input.value = opt;
        input.id = id;

        const span = document.createElement("span");
        span.textContent = opt;

        label.appendChild(input);
        label.appendChild(span);
        optionForm.appendChild(label);
      });
    }

    function getSelectedValue() {
      const checked = optionForm.querySelector("input[type='radio']:checked");
      return checked ? checked.value : null;
    }

    function renderByState() {
      if (state.status === "failed") {
        const failAt = (state.failedAt || 0) + 1;
        failText.textContent = `你在第 ${failAt} 题选择错误，本次问卷已锁定结束。`;
        showOnly(failView);
        return;
      }

      if (state.status === "passed") {
        showOnly(successView);
        return;
      }

      if (state.index >= questions.length) {
        state.status = "passed";
        writeState();
        showOnly(successView);
        return;
      }

      showOnly(quizView);
      renderQuestion();
    }

    submitBtn.addEventListener("click", () => {
      if (state.status !== "in_progress") return;

      const selected = getSelectedValue();
      if (!selected) {
        alert("请先选择一个答案再提交。");
        return;
      }

      const current = questions[state.index];
      if (selected !== current.correct) {
        state.status = "failed";
        state.failedAt = state.index;
        writeState();
        renderByState();
        return;
      }

      state.index += 1;
      if (state.index >= questions.length) {
        state.status = "passed";
      }
      writeState();
      renderByState();
    });

    // Prevent browser back from leaving/replaying the page flow.
    history.pushState({ quiz: true }, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState({ quiz: true }, "", location.href);
      alert("问卷进行中，已禁用回退。");
    });

    renderByState();
  </script>
</body>
</html>
